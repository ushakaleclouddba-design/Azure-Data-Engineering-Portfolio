;SQL Server 2025 Enterprise Developer - Srini Lab
;Used by Install-SQL2025-LocalNode.ps1 and Install-SQL2025-FromNode4.ps1
[OPTIONS]
QUIET="True"
IACCEPTSQLSERVERLICENSETERMS="True"
ACTION="Install"
UPDATEENABLED="False"
FEATURES=SQLENGINE,REPLICATION,FULLTEXT,CONN,BC
INSTANCENAME="MSSQLSERVER"
INSTANCEID="MSSQLSERVER"
INSTANCEDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDDIR="C:\Program Files\Microsoft SQL Server"
INSTALLSHAREDWOWDIR="C:\Program Files (x86)\Microsoft SQL Server"
SQLUSERDBDIR="C:\data"
SQLUSERDBLOGDIR="C:\log"
SQLTEMPDBDIR="C:\data"
SQLTEMPDBLOGDIR="C:\log"
SQLBACKUPDIR="C:\backup"
SQLTEMPDBFILECOUNT="4"
SQLTEMPDBFILESIZE="64"
SQLTEMPDBFILEGROWTH="64"
SQLSVCACCOUNT="NT Service\MSSQLSERVER"
SQLSVCSTARTUPTYPE="Automatic"
SQLSVCINSTANTFILEINIT="True"
AGTSVCACCOUNT="NT Service\SQLSERVERAGENT"
AGTSVCSTARTUPTYPE="Automatic"
SECURITYMODE="SQL"
SQLCOLLATION="SQL_Latin1_General_CP1_CI_AS"
TCPENABLED="1"
NPENABLED="0"
BROWSERSVCSTARTUPTYPE="Automatic"
SQLTELSVCSTARTUPTYPE="Disabled"
ERRORREPORTING="False"
SQMREPORTING="False"
